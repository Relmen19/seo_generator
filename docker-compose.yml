services:
  web:
    build:
      context: ./docker
      args:
        UID: 1000
    container_name: seo_web
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - seo_net

  cron:
    build:
      context: ./docker
      args:
        UID: 1000
    container_name: seo_cron
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    command: ["cron", "-f"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - seo_net

  db:
    image: mysql:8.3
    container_name: seo_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-seo_generator}
      MYSQL_USER: ${MYSQL_USER:-seo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-seo_pass}
      TZ: Europe/Moscow
    ports:
      - "3306:3306"
    volumes:
      - seo_db_data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d
    networks:
      - seo_net
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  puppeteer:
    build: ./docker/puppeteer
    container_name: seo_puppeteer
    restart: unless-stopped
    environment:
      - MAX_CONCURRENT_PAGES=3
    networks:
      - seo_net

volumes:
  seo_db_data:

networks:
  seo_net:
    driver: bridge