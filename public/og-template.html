<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
    :root {
        --primary: {{primary_color}};
        --accent:  {{accent_color}};
        --ink:     {{ink_color}};
        --bg:      {{bg_color}};
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
        position: relative;
    }
    .stage {
        position: relative;
        width: 1200px; height: 630px;
        overflow: hidden;
        display: flex;
        align-items: stretch;
    }
    .bg-art {
        position: absolute; inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 0.18;
        filter: saturate(0.9);
    }
    .bg-grid {
        position: absolute; inset: 0;
        background-image:
            linear-gradient(rgba(15, 23, 42, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(15, 23, 42, 0.05) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse at 80% 50%, rgba(0,0,0,0.6) 0%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse at 80% 50%, rgba(0,0,0,0.6) 0%, transparent 70%);
    }
    .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(50px);
        opacity: 0.4;
    }
    .blob--a {
        right: -60px; top: -80px;
        width: 420px; height: 420px;
        background: var(--primary);
    }
    .blob--b {
        right: 120px; bottom: -100px;
        width: 320px; height: 320px;
        background: var(--accent);
    }
    .geo {
        position: absolute;
        right: 60px; top: 50%;
        transform: translateY(-50%);
        width: 360px; height: 360px;
    }
    .geo-cube {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        border-radius: 32px;
        transform: rotate(12deg);
        box-shadow: 0 30px 80px rgba(15, 23, 42, 0.25);
    }
    .geo-cube--small {
        width: 140px; height: 140px;
        right: -30px; top: -40px;
        inset: auto;
        background: var(--accent);
        border-radius: 18px;
        transform: rotate(-18deg);
        opacity: 0.85;
    }
    .left {
        position: relative;
        z-index: 2;
        padding: 64px 72px;
        width: 720px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .top {
        display: flex;
        align-items: center;
        gap: 14px;
    }
    .logo {
        height: 40px;
        width: auto;
        max-width: 200px;
        object-fit: contain;
    }
    .niche {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--primary);
        opacity: 0.8;
    }
    .title {
        font-size: 56px;
        line-height: 1.1;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--ink);
        max-width: 580px;
        /* Visually clamp to ~5 lines */
        display: -webkit-box;
        -webkit-line-clamp: 5;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .accent-bar {
        width: 88px;
        height: 6px;
        border-radius: 3px;
        background: var(--accent);
        margin-bottom: 18px;
    }
</style>
</head>
<body>
<div class="stage">
    <div class="bg-art" style="background-image: url('{{bg_image_data_uri}}');"></div>
    <div class="bg-grid"></div>
    <div class="blob blob--a"></div>
    <div class="blob blob--b"></div>
    <div class="geo">
        <div class="geo-cube"></div>
        <div class="geo-cube geo-cube--small"></div>
    </div>
    <div class="left">
        <div class="top">
            <img class="logo" src="{{logo_data_uri}}" alt="" onerror="this.style.display='none'">
            <span class="niche">{{niche}}</span>
        </div>
        <div>
            <div class="accent-bar"></div>
            <h1 class="title">{{title}}</h1>
        </div>
    </div>
</div>
</body>
</html>
